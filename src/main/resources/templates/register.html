<!doctype html>
<html lang="en"
      th:replace="~{base :: parent(~{::.content},~{::#title},~{::script})}" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title id="title">Signup Page</title>
</head>
<body>
<div class="content">
    <div class="grid grid-cols-12 gap-7 p-6">
        <!--Page Content-->

        <a href="#"
           class="col-span-5  border-t-4 border-blue-700 border-b-4 col-start-4 w-full bg-neutral-primary-soft block p-6  rounded-xl shadow-xs hover:bg-neutral-secondary-medium">


            <!--alert message-->
<!--            <div data-th-replace="message::messagebox"></div>-->
            <div th:if="${message}"
                 class="p-3 mb-3 rounded text-white"
                 th:classappend="${messageType == 'success'} ? 'bg-green-500' : 'bg-red-500'">

                <span th:text="${message}"></span>

            </div>


            <h5 class="mb-3 text-2xl font-semibold tracking-tight text-heading leading-8">
                Signup Here
            </h5>
            <p class="font-normal text-gray-400">
                Start managing contacts on cloud ...
            </p>
            <form th:action="@{/register}" th:method="post" th:object="${user}" class="mt-5" novalidate>
                <!--name-->
                <div class="mb-3">
                    <label for="name" class="block mb-2.5 text-sm font-medium text-heading">Name</label>
                    <input type="text" th:field="*{name}" id="name" class="bg-neutral-secondary-medium border  rounded-lg text-heading
                     text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Enter here" required />



                <!--Putting errors-->

               <p data-th-if="${#fields.hasErrors('name')}"
                    data-th-errors="*{name}"
                       class="text-red-600 py-2 px-1"></p>

                </div>

                <!--Email-Feild-->

                <div class="mb-3">
                    <label for="email" class="block mb-2.5 text-sm font-medium text-heading">Email</label>
                    <input type="email"  th:field="*{email}" id="email" class="bg-neutral-secondary-medium border  rounded-lg text-heading
                     text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Enter email" required />

                    <p data-th-if="${#fields.hasErrors('email')}"
                       data-th-errors="*{email}"
                       class="text-red-600 py-2 px-1"></p>

                </div>


                <!--Password-Feild-->

                <div class="mb-3">
                    <label for="password" class="block mb-2.5 text-sm font-medium text-heading">Password</label>
                    <input type="password" th:field="*{password}" id="password" class="bg-neutral-secondary-medium border  rounded-lg
                    text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Enter password" required />

                    <p data-th-if="${#fields.hasErrors('password')}"
                       data-th-errors="*{password}"
                       class="text-red-600 py-2 px-1"></p>

                </div>

                <!--Phone-Feild-->

                <div class="mb-3">
                    <label for="contact" class="block mb-2.5 text-sm font-medium text-heading">Contact</label>
                    <input type="number" th:field="*{phoneNumber}" id="contact" class="bg-neutral-secondary-medium border  rounded-lg
                    text-heading text-sm rounded-base focus:ring-brand focus:border-brand block w-full px-3 py-2.5 shadow-xs placeholder:text-body" placeholder="Enter contact" required />

                    <p data-th-if="${#fields.hasErrors('phoneNumber')}"
                       data-th-errors="*{phoneNumber}"
                       class="text-red-600 py-2 px-1"></p>

                </div>

                <!--About-Feild-->
                <div class="mb-4">

                    <label for="about" class="block mb-2.5 text-sm font-medium text-heading">About</label>
                    <textarea id="about" th:field="*{about}" rows="6" class="bg-neutral-secondary-medium border  rounded-lg text-heading
                    text-sm rounded-base focus:ring-brand focus:border-brand block w-full p-3.5 shadow-xs placeholder:text-body" placeholder="Write here..."></textarea>

                    <p data-th-if="${#fields.hasErrors('about')}"
                       data-th-errors="*{about}"
                       class="text-red-600 py-2 px-1"></p>

                </div>
                <!--buttons-->
                <div class="mb-3 flex justify-center space-x-3">
                    <button type="submit" class="px-3 py-2 rounded bg-gray-800 text-white">Signup</button>
                    <button type="reset" class="px-3 py-2 rounded bg-orange-800 text-white">Reset</button>
                </div>




            </form>


        </a>

    </div>
</div>
<script>
    console.log("Signup page");
</script>
</body>
</html>
